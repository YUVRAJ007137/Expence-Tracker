<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding-bottom: 80px;
    }

    .header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .header-title {
      text-align: center;
      flex: 1;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #667eea;
      margin: 0;
    }

    .header .subtitle {
      font-size: 12px;
      color: #666;
      margin-top: 2px;
    }

    .summary-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      margin-bottom: 8px;
    }

    .summary-card {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 20px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
      transition: transform 0.2s;
      border: 2px solid rgba(255, 255, 255, 0.5);
    }

    .summary-card:active {
      transform: scale(0.98);
    }

    .summary-card .icon {
      font-size: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 60px;
      height: 60px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.5);
    }

    .summary-card.total .icon { color: #667eea; }
    .summary-card.paid .icon { color: #10b981; }
    .summary-card.pending .icon { color: #f59e0b; }

    .summary-card .info {
      flex: 1;
      text-align: left;
    }

    .summary-card .label {
      font-size: 11px;
      color: #6b7280;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .summary-card .amount {
      font-size: 28px;
      font-weight: 800;
      color: #1f2937;
      line-height: 1.2;
      word-break: break-word;
    }summary-card.total .icon { color: #667eea; }
    .summary-card.paid .icon { color: #10b981; }
    .summary-card.pending .icon { color: #f59e0b; }

    .summary-card .label {
      font-size: 11px;
      color: #666;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .summary-card .amount {
      font-size: 20px;
      font-weight: 700;
      color: #1f2937;
    }

    .fab-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #10b981, #059669);
      border: none;
      box-shadow: 0 8px 32px rgba(16, 185, 129, 0.5), 0 0 0 4px rgba(255, 255, 255, 0.3);
      color: white;
      font-size: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 1000;
      transition: all 0.2s;
    }

    .fab-button:active {
      transform: scale(0.9);
      box-shadow: 0 4px 16px rgba(16, 185, 129, 0.4), 0 0 0 4px rgba(255, 255, 255, 0.3);
    }

    .expense-list {
      padding: 0 16px 20px;
    }

    .expense-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      position: relative;
    }

    .expense-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .expense-merchant {
      font-size: 16px;
      font-weight: 600;
      color: #1f2937;
      flex: 1;
      margin-right: 12px;
    }

    .expense-date {
      font-size: 12px;
      color: #6b7280;
      white-space: nowrap;
    }

    .expense-amounts {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .amount-item {
      text-align: center;
    }

    .amount-item .label {
      font-size: 10px;
      color: #9ca3af;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .amount-item .value {
      font-size: 16px;
      font-weight: 700;
      color: #1f2937;
    }

    .expense-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid #e5e7eb;
    }

    .status-badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-badge.paid {
      background: #d1fae5;
      color: #065f46;
    }

    .status-badge.pending {
      background: #fef3c7;
      color: #92400e;
    }

    .expense-actions {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .action-btn:active {
      transform: scale(0.9);
    }

    .action-btn.delete {
      background: #fee2e2;
      color: #dc2626;
    }

    .action-btn.paid {
      background: #d1fae5;
      color: #059669;
    }

    .action-btn.undo {
      background: #e0e7ff;
      color: #4f46e5;
    }

    .payment-mode {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #6b7280;
      padding: 4px 8px;
      background: #f3f4f6;
      border-radius: 12px;
      margin-right: 8px;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 2000;
      align-items: flex-end;
      animation: fadeIn 0.2s;
    }

    .modal.active {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal-content {
      background: white;
      width: 100%;
      border-radius: 24px 24px 0 0;
      padding: 24px;
      animation: slideUp 0.3s;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
      color: #1f2937;
    }

    .close-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: #f3f4f6;
      color: #6b7280;
      font-size: 18px;
      cursor: pointer;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
      display: block;
    }

    .form-control, .form-select {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      font-size: 15px;
      transition: border-color 0.2s;
    }

    .form-control:focus, .form-select:focus {
      outline: none;
      border-color: #667eea;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255, 255, 255, 0.8);
    }

    .empty-state i {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.6;
    }

    .empty-state h3 {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 14px;
      opacity: 0.8;
    }

    /* Auth Styles */
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-card {
      background: rgba(255, 255, 255, 0.98);
      border-radius: 24px;
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    .auth-card h2 {
      text-align: center;
      color: #667eea;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .auth-card .subtitle {
      text-align: center;
      color: #6b7280;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .auth-tabs {
      display: flex;
      margin-bottom: 24px;
      background: #f3f4f6;
      border-radius: 12px;
      padding: 4px;
    }

    .auth-tab {
      flex: 1;
      padding: 12px;
      border: none;
      background: transparent;
      border-radius: 10px;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.2s;
    }

    .auth-tab.active {
      background: white;
      color: #667eea;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .auth-error {
      background: #fee2e2;
      color: #dc2626;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }

    .auth-success {
      background: #d1fae5;
      color: #065f46;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-email {
      font-size: 11px;
      color: #6b7280;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      background: #f3f4f6;
      padding: 4px 8px;
      border-radius: 12px;
    }

    .logout-btn {
      padding: 6px 10px;
      border: none;
      background: #fee2e2;
      color: #dc2626;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #e5e7eb;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <!-- Auth Screen -->
  <div class="auth-container" id="authScreen">
    <div class="auth-card">
      <h2>खर्च व्यवस्थापन</h2>
      <p class="subtitle">Expense Tracker</p>
      
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="showAuthTab('login')">Login</button>
        <button class="auth-tab" onclick="showAuthTab('signup')">Sign Up</button>
      </div>

      <div class="auth-error" id="authError"></div>
      <div class="auth-success" id="authSuccess"></div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="loginEmail" class="form-control" placeholder="Enter your email" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password" required />
        </div>
        <button type="submit" class="submit-btn">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>
      </form>

      <!-- Signup Form -->
      <form id="signupForm" class="hidden" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label class="form-label">Name</label>
          <input type="text" id="signupName" class="form-control" placeholder="Enter your name" required />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="signupEmail" class="form-control" placeholder="Enter your email" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="signupPassword" class="form-control" placeholder="Min 6 characters" minlength="6" required />
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="signupConfirm" class="form-control" placeholder="Confirm password" required />
        </div>
        <button type="submit" class="submit-btn">
          <i class="fas fa-user-plus"></i> Sign Up
        </button>
      </form>
    </div>
  </div>

  <!-- Main App (hidden until logged in) -->
  <div id="mainApp" class="hidden">
    <div class="header">
      <div class="header-top">
        <div class="user-info">
          <span class="user-email" id="userEmail"></span>
        </div>
        <div class="header-title">
          <h1>खर्च व्यवस्थापन</h1>
          <div class="subtitle">Expense Tracker</div>
        </div>
        <div class="user-info">
          <button class="logout-btn" onclick="handleLogout()">
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
        </div>
      </div>
    </div>

  <div class="summary-grid">
    <div class="summary-card total">
      <div class="icon"><i class="fas fa-wallet"></i></div>
      <div class="info">
        <div class="label">Total</div>
        <div class="amount" id="totalOverall">₹0</div>
      </div>
    </div>
    <div class="summary-card paid">
      <div class="icon"><i class="fas fa-check-circle"></i></div>
      <div class="info">
        <div class="label">Paid</div>
        <div class="amount" id="totalPaid">₹0</div>
      </div>
    </div>
    <div class="summary-card pending">
      <div class="icon"><i class="fas fa-clock"></i></div>
      <div class="info">
        <div class="label">Pending</div>
        <div class="amount" id="totalPending">₹0</div>
      </div>
    </div>
  </div>

  <div class="expense-list" id="expenseList"></div>

  <button class="fab-button" onclick="openModal()">
    <i class="fas fa-plus"></i>
  </button>

  <div class="modal" id="expenseModal" onclick="closeModalOnBackdrop(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title">नवीन खर्च जोडा</div>
        <button class="close-btn" onclick="closeModal()">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <form id="expenseForm">
        <div class="form-group">
          <label class="form-label">व्यापारी / Merchant Name</label>
          <input type="text" id="merchant" class="form-control" placeholder="Enter merchant name" required />
        </div>

        <div class="form-group">
          <label class="form-label">तारीख / Date</label>
          <input type="date" id="date" class="form-control" required />
        </div>

        <div class="form-group">
          <label class="form-label">एकूण रक्कम / Total Amount (₹)</label>
          <input type="number" id="total" class="form-control" placeholder="0" required />
        </div>

        <div class="form-group">
          <label class="form-label">अ‍ॅडव्हान्स रक्कम / Advance Paid (₹)</label>
          <input type="number" id="advance" class="form-control" placeholder="0" />
        </div>

        <div class="form-group">
          <label class="form-label">पेमेंट प्रकार / Payment Mode</label>
          <select id="mode" class="form-select">
            <option value="Cash">💵 Cash</option>
            <option value="UPI">📱 UPI</option>
            <option value="Card">💳 Card</option>
          </select>
        </div>

        <button type="submit" class="submit-btn">
          <i class="fas fa-plus-circle"></i> खर्च जोडा / Add Expense
        </button>
      </form>
    </div>
  </div>
  </div>

  <script>
    // Supabase Configuration
    const SUPABASE_URL = 'https://jbpwrgjnzgjmhghimqjo.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpicHdyZ2puemdqbWhnaGltcWpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTA3MDAsImV4cCI6MjA4OTU2NjcwMH0.zL_AkueP5wz0slIbd4lppOgqE-zZBgNSw7T_SiErw5U';
    
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // DOM Elements
    const loadingOverlay = document.getElementById('loadingOverlay');
    const authScreen = document.getElementById('authScreen');
    const mainApp = document.getElementById('mainApp');
    const expenseList = document.getElementById("expenseList");
    const totalPaidEl = document.getElementById("totalPaid");
    const totalPendingEl = document.getElementById("totalPending");
    const totalOverallEl = document.getElementById("totalOverall");
    const modal = document.getElementById("expenseModal");
    const form = document.getElementById("expenseForm");
    const authError = document.getElementById('authError');
    const authSuccess = document.getElementById('authSuccess');
    const userEmailEl = document.getElementById('userEmail');

    let expenses = [];
    let currentUser = null;

    // Auth Functions
    function showAuthTab(tab) {
      const loginForm = document.getElementById('loginForm');
      const signupForm = document.getElementById('signupForm');
      const tabs = document.querySelectorAll('.auth-tab');
      
      tabs.forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      
      authError.style.display = 'none';
      authSuccess.style.display = 'none';
      
      if (tab === 'login') {
        loginForm.classList.remove('hidden');
        signupForm.classList.add('hidden');
      } else {
        loginForm.classList.add('hidden');
        signupForm.classList.remove('hidden');
      }
    }

    function showError(message) {
      authError.textContent = message;
      authError.style.display = 'block';
      authSuccess.style.display = 'none';
    }

    function showSuccess(message) {
      authSuccess.textContent = message;
      authSuccess.style.display = 'block';
      authError.style.display = 'none';
    }

    async function handleSignup(e) {
      e.preventDefault();
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('signupConfirm').value;

      if (password !== confirm) {
        showError('Passwords do not match');
        return;
      }

      loadingOverlay.classList.remove('hidden');
      
      const { data, error } = await supabaseClient.auth.signUp({
        email,
        password,
        options: {
          data: {
            full_name: name
          }
        }
      });

      loadingOverlay.classList.add('hidden');

      if (error) {
        showError(error.message);
      } else if (data.user) {
        currentUser = data.user;
        showMainApp();
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      loadingOverlay.classList.remove('hidden');

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      loadingOverlay.classList.add('hidden');

      if (error) {
        showError(error.message);
      } else {
        currentUser = data.user;
        showMainApp();
      }
    }

    async function handleLogout() {
      loadingOverlay.classList.remove('hidden');
      await supabaseClient.auth.signOut();
      currentUser = null;
      expenses = [];
      loadingOverlay.classList.add('hidden');
      showAuthScreen();
    }

    function showAuthScreen() {
      authScreen.classList.remove('hidden');
      mainApp.classList.add('hidden');
    }

    function showMainApp() {
      authScreen.classList.add('hidden');
      mainApp.classList.remove('hidden');
      const userName = currentUser.user_metadata?.full_name || currentUser.email;
      userEmailEl.textContent = userName;
      loadExpenses();
    }

    // Check auth state on load
    async function checkAuth() {
      try {
        const { data: { session }, error } = await supabaseClient.auth.getSession();
        
        if (error) {
          console.error('Auth error:', error);
          showAuthScreen();
        } else if (session) {
          currentUser = session.user;
          showMainApp();
        } else {
          showAuthScreen();
        }
      } catch (err) {
        console.error('checkAuth error:', err);
        showAuthScreen();
      }
      loadingOverlay.classList.add('hidden');
    }

    // Listen for auth changes
    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_OUT') {
        currentUser = null;
        showAuthScreen();
      }
    });

    // Database Functions
    async function loadExpenses() {
      loadingOverlay.classList.remove('hidden');
      
      const { data, error } = await supabaseClient
        .from('expenses')
        .select('*')
        .order('date', { ascending: false });

      loadingOverlay.classList.add('hidden');

      if (error) {
        console.error('Error loading expenses:', error);
        alert('Failed to load expenses. Please refresh the page.');
        return;
      }

      expenses = data || [];
      renderExpenses();
    }

    async function saveExpense(expense) {
      loadingOverlay.classList.remove('hidden');
      
      const { data, error } = await supabaseClient
        .from('expenses')
        .insert([{
          user_id: currentUser.id,
          merchant: expense.merchant,
          date: expense.date,
          total: expense.total,
          advance: expense.advance,
          remaining: expense.remaining,
          mode: expense.mode,
          status: expense.status,
          original_remaining: expense.remaining
        }])
        .select();

      loadingOverlay.classList.add('hidden');

      if (error) {
        console.error('Error saving expense:', error);
        alert('Failed to save expense. Please try again.');
        return false;
      }

      expenses.unshift(data[0]);
      renderExpenses();
      return true;
    }

    async function deleteExpenseFromDB(id) {
      loadingOverlay.classList.remove('hidden');
      
      const { error } = await supabaseClient
        .from('expenses')
        .delete()
        .eq('id', id);

      loadingOverlay.classList.add('hidden');

      if (error) {
        console.error('Error deleting expense:', error);
        alert('Failed to delete expense. Please try again.');
        return false;
      }

      expenses = expenses.filter(exp => exp.id !== id);
      renderExpenses();
      return true;
    }

    async function updateExpenseStatus(id, status, remaining, originalRemaining) {
      loadingOverlay.classList.remove('hidden');
      
      const updateData = { status, remaining };
      if (originalRemaining !== undefined) {
        updateData.original_remaining = originalRemaining;
      }

      const { error } = await supabaseClient
        .from('expenses')
        .update(updateData)
        .eq('id', id);

      loadingOverlay.classList.add('hidden');

      if (error) {
        console.error('Error updating expense:', error);
        alert('Failed to update expense. Please try again.');
        return false;
      }

      const expIndex = expenses.findIndex(exp => exp.id === id);
      if (expIndex !== -1) {
        expenses[expIndex].status = status;
        expenses[expIndex].remaining = remaining;
        if (originalRemaining !== undefined) {
          expenses[expIndex].original_remaining = originalRemaining;
        }
      }
      renderExpenses();
      return true;
    }

    function formatDateForDisplay(dateStr) {
      if (!dateStr) return "";
      try {
        if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
          const date = new Date(dateStr + 'T00:00:00');
          return date.toLocaleDateString("en-GB", {
            day: "2-digit",
            month: "short",
            year: "numeric",
          });
        }
        return dateStr;
      } catch {
        return dateStr;
      }
    }

    function parseDate(dateStr) {
      if (!dateStr) return new Date(0);
      try {
        if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
          return new Date(dateStr + 'T00:00:00');
        }
        return new Date(dateStr);
      } catch {
        return new Date(0);
      }
    }

    function updateTotals() {
      let totalPaid = 0;
      let totalPending = 0;
      let totalOverall = 0;

      expenses.forEach((exp) => {
        totalOverall += exp.total;
        
        if (exp.status === "Paid") {
          totalPaid += exp.total;
        } else {
          // For pending expenses, add the advance to paid
          totalPaid += exp.advance;
          totalPending += exp.remaining;
        }
      });

      totalPaidEl.textContent = `₹${totalPaid}`;
      totalPendingEl.textContent = `₹${totalPending}`;
      totalOverallEl.textContent = `₹${totalOverall}`;
    }

    function renderExpenses() {
      const sortedExpenses = [...expenses].sort((a, b) => {
        const dateA = parseDate(a.date);
        const dateB = parseDate(b.date);
        return dateB - dateA;
      });

      if (sortedExpenses.length === 0) {
        expenseList.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-receipt"></i>
            <h3>No expenses yet</h3>
            <p>Tap the + button to add your first expense</p>
          </div>
        `;
      } else {
        expenseList.innerHTML = sortedExpenses.map((exp) => {
          const modeIcon = exp.mode === 'Cash' ? '💵' : exp.mode === 'UPI' ? '📱' : '💳';
          return `
            <div class="expense-card">
              <div class="expense-header">
                <div class="expense-merchant">${exp.merchant}</div>
                <div class="expense-date">${formatDateForDisplay(exp.date)}</div>
              </div>
              <div class="expense-amounts">
                <div class="amount-item">
                  <div class="label">Total</div>
                  <div class="value">₹${exp.total}</div>
                </div>
                <div class="amount-item">
                  <div class="label">Advance</div>
                  <div class="value">₹${exp.advance}</div>
                </div>
                <div class="amount-item">
                  <div class="label">Remaining</div>
                  <div class="value">₹${exp.remaining}</div>
                </div>
              </div>
              <div class="expense-footer">
                <div>
                  <span class="payment-mode">${modeIcon} ${exp.mode}</span>
                  <span class="status-badge ${exp.status === 'Paid' ? 'paid' : 'pending'}">
                    ${exp.status}
                  </span>
                </div>
                <div class="expense-actions">
                  <button class="action-btn delete" onclick="deleteExpense('${exp.id}')">
                    <i class="fas fa-trash"></i>
                  </button>
                  ${exp.status === 'Pending' 
                    ? `<button class="action-btn paid" onclick="markPaid('${exp.id}')">
                        <i class="fas fa-check"></i>
                      </button>`
                    : `<button class="action-btn undo" onclick="undoPaid('${exp.id}')">
                        <i class="fas fa-undo"></i>
                      </button>`
                  }
                </div>
              </div>
            </div>
          `;
        }).join('');
      }
      updateTotals();
    }

    function openModal() {
      modal.classList.add('active');
      document.getElementById('date').valueAsDate = new Date();
    }

    function closeModal() {
      modal.classList.remove('active');
      form.reset();
    }

    function closeModalOnBackdrop(event) {
      if (event.target === modal) {
        closeModal();
      }
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const dateInput = document.getElementById("date").value;
      const merchant = document.getElementById("merchant").value.trim();
      const total = parseFloat(document.getElementById("total").value) || 0;
      const advance = parseFloat(document.getElementById("advance").value) || 0;
      const mode = document.getElementById("mode").value;

      if (!merchant || !total) {
        alert("Please fill in all required fields.");
        return;
      }

      const remaining = total - advance;

      const newExpense = {
        date: dateInput,
        merchant,
        total,
        advance,
        remaining,
        mode,
        status: "Pending",
      };

      const success = await saveExpense(newExpense);
      if (success) {
        closeModal();
      }
    });

    window.deleteExpense = async function (id) {
      if (confirm("Delete this expense?")) {
        await deleteExpenseFromDB(id);
      }
    };

    window.markPaid = async function (id) {
      const exp = expenses.find(e => e.id === id);
      if (exp) {
        await updateExpenseStatus(id, "Paid", 0, exp.remaining);
      }
    };

    window.undoPaid = async function (id) {
      const exp = expenses.find(e => e.id === id);
      if (exp) {
        const originalRemaining = exp.original_remaining !== undefined 
          ? exp.original_remaining 
          : (exp.total - exp.advance);
        await updateExpenseStatus(id, "Pending", originalRemaining);
      }
    };

    // Initialize app
    checkAuth();
  </script>
</body>
</html>
